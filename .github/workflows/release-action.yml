name: Release Action
on:
  push:
    tags:
      - 'action-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#action-v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SeedForge Action v${{ steps.version.outputs.version }}
          body: |
            ## SeedForge Action v${{ steps.version.outputs.version }}

            To use this action:

            ```yaml
            - name: Seed database
              uses: seedforge/seedforge/.github/actions/seedforge-action@v${{ steps.version.outputs.version }}
              with:
                connection-string: \${{ secrets.DATABASE_URL }}
                config-path: seedforge.config.ts
                mode: fresh
            ```

            See [docs/integrations/preview-databases.md](./docs/integrations/preview-databases.md) for the full preview-database recipe.
          draft: false
          prerelease: false
