name: Preview DB — Neon
on:
  push:
    branches: [main]

jobs:
  preview-neon:
    if: env.NEON_API_KEY != '' && env.NEON_PROJECT_ID != ''
    runs-on: ubuntu-latest
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Create Neon branch
        id: neon-branch
        run: |
          BRANCH_NAME="ci-validate-${{ github.sha }}"
          RESP=$(curl -s -X POST \
            "https://api.neon.tech/v2/projects/${{ secrets.NEON_PROJECT_ID }}/branches" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "endpoints": [{"type": "read_write"}],
              "branch": {
                "parent_id": "br-main",
                "name": "'"$BRANCH_NAME"'"
              }
            }')
          echo "Neon API response: $(echo "$RESP" | jq -c '.')"
          BRANCH_ID=$(echo "$RESP" | jq -r '.branch.id // empty')
          HOST=$(echo "$RESP" | jq -r '.endpoints[0].host // empty')
          if [ -z "$BRANCH_ID" ]; then
            echo "::error::Failed to create Neon branch"
            echo "$RESP" | jq .
            exit 1
          fi
          echo "branch-id=$BRANCH_ID" >> $GITHUB_OUTPUT
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          if [ -n "$HOST" ]; then
            echo "connection-string=postgresql://neondb_owner:${{ secrets.NEON_PASSWORD }}@$HOST/neondb?sslmode=require" >> $GITHUB_OUTPUT
          else
            echo "connection-string=postgresql://neondb_owner:${{ secrets.NEON_PASSWORD }}@${BRANCH_ID}.${{ secrets.NEON_PROJECT_ID }}.cloud.neon.tech/neondb?sslmode=require" >> $GITHUB_OUTPUT
          fi

      - name: Wait for branch readiness
        run: sleep 15

      - name: Load fixture schema
        run: |
          PGPASSWORD="${{ secrets.NEON_PASSWORD }}" psql \
            -h "$(echo '${{ steps.neon-branch.outputs.connection-string }}' | sed 's/.*@//;s/:.*//')" \
            -U neondb_owner \
            -d neondb \
            -f fixtures/ecommerce/schema.sql
        env:
          PGPASSWORD: ${{ secrets.NEON_PASSWORD }}

      - name: Seed preview database
        uses: ./.github/actions/seedforge-action
        with:
          connection-string: ${{ steps.neon-branch.outputs.connection-string }}
          config-path: fixtures/configs/postgres.ecommerce.ts
          mode: fresh
          json: 'true'

      - name: Verify seeded rows
        run: |
          HOST=$(echo '${{ steps.neon-branch.outputs.connection-string }}' | sed 's/.*@//;s/:.*//')
          echo "=== Neon preview DB row counts ==="
          for TABLE in users products tags product_tags orders order_items reviews; do
            COUNT=$(PGPASSWORD="${{ secrets.NEON_PASSWORD }}" psql \
              -h "$HOST" -U neondb_owner -d neondb \
              -t -A -c "SELECT COUNT(*) FROM \"$TABLE\";")
            echo "  $TABLE: $COUNT rows"
            if [ "$COUNT" -eq 0 ]; then
              echo "::error::$TABLE has 0 rows — seed failed"
              exit 1
            fi
          done

      - name: Delete Neon branch
        if: always()
        run: |
          curl -s -X DELETE \
            "https://api.neon.tech/v2/projects/${{ secrets.NEON_PROJECT_ID }}/branches/${{ steps.neon-branch.outputs.branch-id }}" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}"
          echo "Neon branch ${{ steps.neon-branch.outputs.branch-name }} deleted"
