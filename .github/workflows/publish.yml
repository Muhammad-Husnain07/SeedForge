name: Publish
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Generate changeset for changed packages
        run: node scripts/auto-changeset.mjs

      - name: Check for changesets
        id: check
        run: |
          count=$(find .changeset -name '*.json' ! -name 'config.json' 2>/dev/null | wc -l)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Found $count changeset(s)"

      - name: Version packages
        if: steps.check.outputs.count != '0'
        run: pnpm changeset version

      - name: Commit version bump
        if: steps.check.outputs.count != '0'
        run: |
          git add .
          git diff --staged --quiet || git commit -m "Version bump [skip ci]"
          git push

      - name: Build packages
        if: steps.check.outputs.count != '0'
        run: pnpm build

      - name: Publish to npm
        if: steps.check.outputs.count != '0'
        run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
