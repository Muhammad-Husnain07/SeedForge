services:
  postgres:
    image: postgres:16
    container_name: seedforge-pg
    environment:
      POSTGRES_USER: seedforge
      POSTGRES_PASSWORD: seedforge
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seedforge -d ecommerce"]
      interval: 3s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8
    container_name: seedforge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: seedforge
      MYSQL_PASSWORD: seedforge
      MYSQL_DATABASE: ecommerce
    ports:
      - "3306:3306"
    volumes:
      - ./schema.mysql.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 3s
      retries: 10
